<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="background:#09090b;font-family:system-ui,sans-serif">
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#84cc16" font-size="20" font-weight="700">Where Does the Concern Start?</text>

  <!-- Lightning bolts (shock symbols) -->
  <g opacity="0.15">
    <polygon points="200,60 210,100 195,100 205,140" fill="#fbbf24"/>
    <polygon points="600,60 610,100 595,100 605,140" fill="#f87171"/>
  </g>

  <!-- LEFT SIDE: Single Cell — nobody cares -->
  <g transform="translate(200, 220)">
    <!-- Cell body -->
    <ellipse cx="0" cy="0" rx="45" ry="35" fill="none" stroke="#84cc16" stroke-width="2" opacity="0.6"/>
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="14" fill="#84cc16" opacity="0.15"/>
    <circle cx="0" cy="0" r="6" fill="#84cc16" opacity="0.3"/>
    <!-- Dendrites -->
    <line x1="-45" y1="-10" x2="-75" y2="-30" stroke="#84cc16" stroke-width="1.5" opacity="0.4"/>
    <line x1="-42" y1="15" x2="-70" y2="35" stroke="#84cc16" stroke-width="1.5" opacity="0.4"/>
    <line x1="45" y1="-5" x2="80" y2="-25" stroke="#84cc16" stroke-width="1.5" opacity="0.4"/>
    <line x1="45" y1="10" x2="85" y2="20" stroke="#84cc16" stroke-width="1.5" opacity="0.4"/>
    <!-- Axon -->
    <line x1="0" y1="35" x2="0" y2="70" stroke="#84cc16" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="70" x2="-15" y2="85" stroke="#84cc16" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="70" x2="15" y2="85" stroke="#84cc16" stroke-width="1.5" opacity="0.3"/>

    <!-- Shock symbol -->
    <polygon points="-8,-55 2,-40 -5,-40 5,-25" fill="#fbbf24" opacity="0.8"/>
    <polygon points="8,-55 18,-40 11,-40 21,-25" fill="#fbbf24" opacity="0.5"/>
  </g>

  <text x="200" y="340" text-anchor="middle" fill="#6b6f7b" font-size="14" font-weight="600">Single Neuron</text>
  <text x="200" y="360" text-anchor="middle" fill="#464a55" font-size="11">"oh, cool"</text>

  <!-- Reaction meter - left (no concern) -->
  <rect x="140" y="375" width="120" height="8" rx="4" fill="#27272a"/>
  <rect x="140" y="375" width="12" height="8" rx="4" fill="#84cc16" opacity="0.6"/>
  <text x="140" y="400" fill="#464a55" font-size="9">concern: 0%</text>

  <!-- CENTER: Arrow / spectrum -->
  <text x="400" y="220" text-anchor="middle" fill="#27272a" font-size="60">→</text>
  <text x="400" y="250" text-anchor="middle" fill="#464a55" font-size="10">grains of sand...</text>
  <text x="400" y="265" text-anchor="middle" fill="#464a55" font-size="10">where is the line?</text>

  <!-- RIGHT SIDE: Whole Brain — people worry -->
  <g transform="translate(600, 210)">
    <!-- Brain outline -->
    <path d="M-50,-30 C-50,-60 -20,-70 0,-65 C20,-70 50,-60 50,-30 C55,-10 50,15 35,30 C20,45 -20,45 -35,30 C-50,15 -55,-10 -50,-30Z" fill="none" stroke="#f87171" stroke-width="2.5" opacity="0.7"/>
    <!-- Brain folds -->
    <path d="M-30,-40 C-15,-25 15,-25 30,-40" fill="none" stroke="#f87171" stroke-width="1.2" opacity="0.3"/>
    <path d="M-40,-15 C-20,0 20,0 40,-15" fill="none" stroke="#f87171" stroke-width="1.2" opacity="0.3"/>
    <path d="M-35,10 C-15,25 15,25 35,10" fill="none" stroke="#f87171" stroke-width="1.2" opacity="0.3"/>
    <!-- Center line -->
    <line x1="0" y1="-65" x2="0" y2="40" stroke="#f87171" stroke-width="1" opacity="0.2"/>
    <!-- Brain glow -->
    <ellipse cx="0" cy="-10" rx="35" ry="30" fill="#f87171" opacity="0.05"/>

    <!-- Shock symbol (bigger, red) -->
    <polygon points="-12,-85 4,-60 -6,-60 10,-35" fill="#f87171" opacity="0.9"/>
    <polygon points="8,-85 24,-60 14,-60 30,-35" fill="#f87171" opacity="0.6"/>
  </g>

  <text x="600" y="340" text-anchor="middle" fill="#6b6f7b" font-size="14" font-weight="600">Whole Brain</text>
  <text x="600" y="360" text-anchor="middle" fill="#f87171" font-size="11">"wait, should you?"</text>

  <!-- Reaction meter - right (high concern) -->
  <rect x="540" y="375" width="120" height="8" rx="4" fill="#27272a"/>
  <rect x="540" y="375" width="100" height="8" rx="4" fill="#f87171" opacity="0.7"/>
  <text x="540" y="400" fill="#f87171" font-size="9">concern: 85%</text>

  <!-- Ken's question - bottom -->
  <rect x="200" y="415" width="400" height="30" rx="8" fill="#27272a" opacity="0.8"/>
  <text x="400" y="435" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Ken's question: "whose cells are these?"</text>
</svg>
