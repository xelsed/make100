<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background:#18181b;font-family:system-ui,sans-serif">
  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#84cc16" font-size="22" font-weight="700">Seder Experiment: Age vs Afikomen Speed</text>
  <text x="400" y="70" text-anchor="middle" fill="#6b6f7b" font-size="13">Hypothesis: Older kids find the afikomen faster</text>

  <!-- Chart area -->
  <line x1="120" y1="120" x2="120" y2="350" stroke="#27272a" stroke-width="2"/>
  <line x1="120" y1="350" x2="680" y2="350" stroke="#27272a" stroke-width="2"/>

  <!-- Y axis label -->
  <text x="40" y="240" text-anchor="middle" fill="#6b6f7b" font-size="12" transform="rotate(-90,40,240)">Time to Find (faster →)</text>

  <!-- X axis label -->
  <text x="400" y="390" text-anchor="middle" fill="#6b6f7b" font-size="12">Age (younger → older)</text>

  <!-- Expected trend line (dashed) -->
  <line x1="180" y1="300" x2="620" y2="160" stroke="#27272a" stroke-width="2" stroke-dasharray="8,6"/>
  <text x="630" y="155" fill="#464a55" font-size="11">Expected</text>

  <!-- Actual result line -->
  <line x1="180" y1="170" x2="620" y2="310" stroke="#f87171" stroke-width="3"/>
  <text x="630" y="315" fill="#f87171" font-size="11" font-weight="600">Actual</text>

  <!-- Data points -->
  <circle cx="220" cy="175" r="12" fill="#84cc16" opacity="0.9"/>
  <text x="220" y="180" text-anchor="middle" fill="#09090b" font-size="11" font-weight="700">1st</text>
  <text x="220" y="148" text-anchor="middle" fill="#84cc16" font-size="10">Youngest</text>

  <circle cx="420" cy="240" r="10" fill="#fbbf24" opacity="0.8"/>
  <text x="420" y="244" text-anchor="middle" fill="#09090b" font-size="10" font-weight="700">2nd</text>

  <circle cx="580" cy="300" r="12" fill="#f87171" opacity="0.9"/>
  <text x="580" y="304" text-anchor="middle" fill="#09090b" font-size="11" font-weight="700">Last</text>
  <text x="580" y="330" text-anchor="middle" fill="#f87171" font-size="10">Oldest (designed</text>
  <text x="580" y="343" text-anchor="middle" fill="#f87171" font-size="10">the experiment)</text>

  <!-- Flaws box -->
  <rect x="120" y="410" width="560" height="80" rx="12" fill="#27272a" stroke="#f87171" stroke-width="1" opacity="0.8"/>
  <text x="140" y="432" fill="#f87171" font-size="12" font-weight="700">⚠ Design Flaws:</text>
  <text x="140" y="452" fill="#a1a1aa" font-size="11">1. Experimenter was a participant  2. Sample size = 1 Seder</text>
  <text x="140" y="472" fill="#a1a1aa" font-size="11">3. Younger kids more motivated by prize  4. Result dismissed as "no correlation"</text>
</svg>
